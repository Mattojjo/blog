<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round-D-Blog</title>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <div id="root">
        <div class="header"><h1>Round-D-Blog</h1></div>
        
        <div id="topButtonContainer" class="button-container">
            <button id="addButton" class="postButtons">Add Post</button>
            <button id="deleteButton" class="postButtons">Delete</button>
        </div>
        
        <div id="posts"></div>
        
        <div class="button-container">
            <button id="previousButton" class="postButtons">Previous</button>
            <button id="nextButton" class="postButtons">Next</button>
        </div>
    </div>

    <div id="postModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button id="modalClose" class="modal-close" type="button" aria-label="Close">×</button>
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
        </div>
    </div>
</body>
</html>
<script type="module" src="scripts/script.js"></script>
