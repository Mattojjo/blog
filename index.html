<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round-D-Blog</title>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <div id="loadingSpinner" class="spinner hidden" aria-live="polite" aria-label="Loading posts"></div>
    
    <div id="root">
        <div class="header"><h1>Round-D-Blog</h1></div>
        
        <div id="topButtonContainer" class="button-container">
            <button id="addButton" class="postButtons">Add Post</button>
        </div>

        <div id="postsSection">
            <div id="posts"></div>

            <div id="paginationContainer" class="button-container is-hidden">
                <button id="previousButton" class="postButtons">Previous</button>
                <button id="nextButton" class="postButtons">Next</button>
            </div>
        </div>
    </div>

    <div id="postModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button id="modalClose" class="modal-close" type="button" aria-label="Close">×</button>
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
            <div class="modal-actions">
                <button id="modalDeleteButton" class="postButtons" type="button">Delete Post</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
            <button id="addModalClose" class="modal-close" type="button" aria-label="Close">×</button>
            <h2 id="addModalTitle">Add New Post</h2>
            <form id="addPostForm" class="form-group">
                <div class="form-field">
                    <label for="postTitleInput">Title</label>
                    <input id="postTitleInput" type="text" placeholder="Enter post title" required>
                </div>
                <div class="form-field">
                    <label for="postDescriptionInput">Description</label>
                    <textarea id="postDescriptionInput" placeholder="Enter post description" rows="5"></textarea>
                </div>
            </form>
            <div class="modal-actions">
                <button id="addModalCancel" class="postButtons" type="button">Cancel</button>
                <button id="addModalSave" class="postButtons" type="button">Save Post</button>
            </div>
        </div>
    </div>
</body>
</html>
<script type="module">
// Inlined from scripts/utils/api.js
let posts = [];

function shouldFetch() {
  return !document.hidden;
}

async function fetchData() {
  try {
    if (!shouldFetch()) {
      return;
    }
    const response = await fetch("http://127.0.0.1:8000/items/");
    posts = await response.json();
  } catch (error) {
    console.log("Error fetching items:", error);
  }
}

async function addData(obj) {
  try {
    const response = await fetch("http://127.0.0.1:8000/items/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(obj),
    });

    if (!response.ok) {
      throw new Error(`Add failed with status ${response.status}`);
    }

    const data = await response.json();
    posts.push(data);
  } catch (error) {
    console.log("Error adding item:", error);
  }
}

function getPosts() {
  return posts;
}

async function deletePost(id) {
  try {
    const response = await fetch(`http://127.0.0.1:8000/items/${id}`, {
      method: "DELETE",
    });

    if (!response.ok) {
      throw new Error(`Delete failed with status ${response.status}`);
    }

    posts = posts.filter((post) => post.id !== id);
  } catch (error) {
    console.log("Error deleting item:", error);
  }
}

// Inlined from scripts/utils/pagination.js
let start = 0;
const end = 10;
const postCache = new Map();
const postsContainer = document.getElementById("posts");
const paginationContainer = document.getElementById("paginationContainer");
const previousButton = document.getElementById("previousButton");
const nextButton = document.getElementById("nextButton");
const addButton = document.getElementById("addButton");
const postModal = document.getElementById("postModal");
const modalClose = document.getElementById("modalClose");
const modalTitle = document.getElementById("modalTitle");
const modalDescription = document.getElementById("modalDescription");
const modalDeleteButton = document.getElementById("modalDeleteButton");

const addModal = document.getElementById("addModal");
const addModalClose = document.getElementById("addModalClose");
const addModalCancel = document.getElementById("addModalCancel");
const addModalSave = document.getElementById("addModalSave");
const postTitleInput = document.getElementById("postTitleInput");
const postDescriptionInput = document.getElementById("postDescriptionInput");

let selectedPostId = null;
let lastFocusedElement = null;

function getPostTitle(post) {
  return post.title ?? post.name ?? "Untitled";
}

function openModal(post) {
  if (!postModal || !modalTitle || !modalDescription) {
    return;
  }
  lastFocusedElement = document.activeElement instanceof HTMLElement ? document.activeElement : null;
  selectedPostId = post.id ?? null;
  modalTitle.textContent = getPostTitle(post);
  modalDescription.textContent = post.description ?? "No description";
  if (modalDeleteButton) {
    modalDeleteButton.disabled = selectedPostId == null;
  }
  postModal.classList.remove("hidden");
  postModal.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
  if (modalDeleteButton && !modalDeleteButton.disabled) {
    modalDeleteButton.focus();
  } else if (modalClose) {
    modalClose.focus();
  }
}

function closeModal() {
  if (!postModal) {
    return;
  }
  const activeElement = document.activeElement;
  if (activeElement instanceof HTMLElement && postModal.contains(activeElement)) {
    activeElement.blur();
  }
  selectedPostId = null;
  postModal.classList.add("hidden");
  postModal.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
  if (lastFocusedElement && lastFocusedElement.isConnected) {
    setTimeout(() => lastFocusedElement.focus(), 150);
  }
  lastFocusedElement = null;
}

function openAddModal() {
  if (!addModal) {
    return;
  }
  lastFocusedElement = document.activeElement instanceof HTMLElement ? document.activeElement : null;
  postTitleInput.value = "";
  postDescriptionInput.value = "";
  addModal.classList.remove("hidden");
  addModal.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
  postTitleInput.focus();
}

function closeAddModal() {
  if (!addModal) {
    return;
  }
  const activeElement = document.activeElement;
  if (activeElement instanceof HTMLElement && addModal.contains(activeElement)) {
    activeElement.blur();
  }
  addModal.classList.add("hidden");
  addModal.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
  if (lastFocusedElement && lastFocusedElement.isConnected) {
    setTimeout(() => lastFocusedElement.focus(), 150);
  }
  lastFocusedElement = null;
}

function renderPosts(arg) {
  const postsArr = getPosts();
  if (arg === "previous") {
    start = Math.max(0, start - end);
  } else if (arg === "next") {
    if (start + end < postsArr.length) {
      start += end;
    }
  }

  const currentArray = postsArr.slice(start, start + end);

  requestAnimationFrame(() => {
    if (postsContainer) {
      postsContainer.innerHTML = currentArray.map((post, index) => {
        const cacheKey = `${post.id}`;
        if (!postCache.has(cacheKey)) {
          postCache.set(cacheKey, 
            `<div class="post" data-post-index="${start + index}"><h2>${getPostTitle(post)}</h2><p>${post.description ?? ""}</p></div>`
          );
        }
        return postCache.get(cacheKey);
      }).join("");
    }

    if (paginationContainer) {
      paginationContainer.classList.remove("is-hidden");
    }
    if (nextButton) nextButton.disabled = start + end >= postsArr.length;
    if (previousButton) previousButton.disabled = start <= 0;
  });
}

function load10(arg) {
  renderPosts(arg);
}

if (nextButton) nextButton.addEventListener("click", () => renderPosts("next"));
if (previousButton) previousButton.addEventListener("click", () => renderPosts("previous"));
if (postsContainer) postsContainer.addEventListener("click", (event) => {
  const postElement = event.target.closest(".post");
  if (!postElement) {
    return;
  }

  const postIndex = Number(postElement.dataset.postIndex);
  const post = getPosts()[postIndex];
  if (post) {
    openModal(post);
  }
});

if (modalClose) {
  modalClose.addEventListener("click", closeModal);
}

if (postModal) {
  postModal.addEventListener("click", (event) => {
    if (event.target === postModal) {
      closeModal();
    }
  });
}

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") {
    const postModalHidden = postModal?.classList.contains("hidden");
    const addModalHidden = addModal?.classList.contains("hidden");

    if (!postModalHidden) {
      closeModal();
    } else if (!addModalHidden) {
      closeAddModal();
    }
  }
});

if (addButton) {
  addButton.addEventListener("click", openAddModal);
}

if (addModalClose) {
  addModalClose.addEventListener("click", closeAddModal);
}

if (addModalCancel) {
  addModalCancel.addEventListener("click", closeAddModal);
}

if (addModal) {
  addModal.addEventListener("click", (event) => {
    if (event.target === addModal) {
      closeAddModal();
    }
  });
}

if (addModalSave) {
  addModalSave.addEventListener("click", async () => {
    const title = postTitleInput.value.trim();
    const description = postDescriptionInput.value.trim();

    if (!title) {
      alert("Please enter a title");
      return;
    }

    const newPost = { title, description };
    await addData(newPost);
    closeAddModal();
    renderPosts();
  });
}

if (modalDeleteButton) {
  modalDeleteButton.addEventListener("click", async () => {
    if (selectedPostId == null) {
      return;
    }

    await deletePost(selectedPostId);
    closeModal();

    const postsArr = getPosts();
    if (start >= postsArr.length && start > 0) {
      start = Math.max(0, start - end);
    }

    renderPosts();
  });
}

// Inlined from scripts/script.js (init)
const loadingSpinner = document.getElementById("loadingSpinner");

(async () => {
  if (loadingSpinner) {
    loadingSpinner.classList.remove("hidden");
  }

  await fetchData();

  if (loadingSpinner) {
    loadingSpinner.classList.add("hidden");
  }

  load10();
})();
</script>
